---
environment: "production"
db:
  driver: "mysql"
  connection: "crynux_wallet:crynuxwalletpass@(mysql:3306)/crynux_wallet?parseTime=true"
  log:
    level: "info"
    output: "/app/data/logs/crynux_relay_wallet_db.log"
    max_file_size: 100
    max_days: 30
    max_file_num: 5
log:
  level: "info"
  output: "/app/data/logs/crynux_relay_wallet.log"
  max_file_size: 100
  max_days: 30
  max_file_num: 5
  heartbeat_log_file: "/app/data/logs/heartbeat.log"
  alert_log_file: "/app/data/logs/alert.log"
blockchains:
  base-sepolia:
    rps: 20
    rpc_endpoint: "https://sepolia.base.org"
    token_type: "erc20"
    token_address: "0x0000000000000000000000000000000000000002"
    gas_limit: 200000
    gas_limit_buffer_percent: 20
    max_fee_per_gas: 1000000000
    max_priority_fee_per_gas: 10000000
    chain_id: 84532
    account:
      address: ""
      private_key_file: "/app/config/blockchain_privkey.txt"
    contracts:
      benefit_address: "0x0000000000000000000000000000000000000001"
    max_retries: 3
    retry_interval: 3
    receipt_wait_time: 30
    sent_transaction_count_limit: 200
  crynux-on-base-sepolia:
    rps: 20
    rpc_endpoint: "https://json-rpc.base-sepolia.crynux.io"
    token_type: "native"
    gas_limit: 100000
    gas_limit_buffer_percent: 20
    max_fee_per_gas: 3000000000
    max_priority_fee_per_gas: 1000000
    chain_id: 188962142
    account:
      address: ""
      private_key_file: "/app/config/blockchain_privkey.txt"
    contracts:
      benefit_address: "0xFc80e019d00f0d06CbebdE648990A89c5a25B425"
    max_retries: 3
    retry_interval: 3
    receipt_wait_time: 30
    sent_transaction_count_limit: 200
relay:
  api:
    host: "http://crynux_relay:8080"
    private_key_file: "/app/config/relay_api_privkey.txt"
  deposit_address: ""
  withdrawal_fee_address: ""
tasks:
  sync_task_fee_logs:
    interval_seconds: 5
    batch_size: 100
    max_task_fee_amount: 100
    max_address_logs_count_in_batch: 50
    max_new_address_count_in_batch: 20
    deposit_max_age_seconds: 259200
  sync_withdrawal_requests:
    interval_seconds: 5
    batch_size: 100
    min_withdrawal_amount: 1
  process_withdrawal_requests:
    interval_seconds: 5
    batch_size: 10
    timeout: 300
